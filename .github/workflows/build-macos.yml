name: Build macOS Plugins

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS Release
    runs-on: macos-15

    steps:
      - name: Check out GAS
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake
          -S .
          -B build-macos
          -G Xcode
          -DCMAKE_BUILD_TYPE=Release
          -DSCC_BASE_PLUGIN_FORMATS="AU;AUv3;Standalone;VST3"

      - name: Build
        run: cmake --build build-macos --config Release

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: The-Great-American-Spring-macOS
          path: build-macos/TheGreatAmericanSpring_artefacts/Release
