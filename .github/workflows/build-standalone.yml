name: Build Windows Standalone

on:
  push:
    branches: [claude/refactor]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DSCC_BASE_PLUGIN_FORMATS=Standalone `
            -DSCC_DEPLOY_WINDOWS_VST3_AFTER_BUILD=OFF

      - name: Build Standalone
        run: cmake --build build --config Release --target TheGreatAmericanSpring_Standalone

      - name: Collect artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem build -Recurse -Filter "*.exe" |
                 Where-Object { $_.FullName -match "Standalone" } |
                 Select-Object -First 1
          if (-not $exe) { throw "Standalone .exe not found" }
          New-Item -ItemType Directory -Path artifact | Out-Null
          Copy-Item $exe.FullName artifact\
          $irs = Join-Path $exe.DirectoryName "Spring IRs"
          if (Test-Path $irs) { Copy-Item $irs artifact\ -Recurse }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GAS-Standalone-Windows
          path: artifact\
          retention-days: 14
